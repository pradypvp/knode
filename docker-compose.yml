services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: knode
      POSTGRES_PASSWORD: knode
      POSTGRES_DB: knode
    ports:
      - "5432:5432"
    volumes:
      - knode_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knode -d knode"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    command: redis-server --appendonly yes
    volumes:
      - knode_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  knode_pg:
  knode_redis:
